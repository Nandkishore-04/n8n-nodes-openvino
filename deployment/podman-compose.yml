# n8n + OpenVINO native-gateway stack (Linux / Intel GPU).
#
# The NATIVE gateway run (python scripts/native_gateway.py) is the TESTED path and works on both
# Windows and Linux. This container stack is provided for Linux users who prefer containers on an
# Intel host with GPU drivers. Windows users run the gateway natively (WSL can't pass the chips in).
#
# Usage:
#   cd deployment
#   cp .env.example .env    # set POSTGRES_PASSWORD, N8N_ENCRYPTION_KEY, RENDER_GROUP_ID, DOC_ROOT
#   # place your OpenVINO model dirs under deployment/models/  (VLM, LLM, BGE, clip — see README)
#   podman-compose up -d
#   podman-compose logs -f gateway   # wait for "Ready -> http://0.0.0.0:8000"
#   n8n: http://localhost:5678
#
# In the imported workflow's Config node, set (container values):
#   docRoot=/data  gatewayUrl=http://gateway:8000  qdrantUrl=http://qdrant:6333

services:

  # ── OpenVINO gateway ──────────────────────────────────────────────────────────
  # scripts/native_gateway.py: VLM OCR + Qwen3 LLM (GPU), CLIP document triage, BGE embeddings.
  gateway:
    build:
      context: ..
      dockerfile: deployment/gateway.Dockerfile
    container_name: openvino-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Intel GPU passthrough. For NPU triage: also add "- /dev/accel/accel0" here and set CLIP_DEVICE=NPU
    # in .env (needs the intel_vpu driver on the host — best-effort, untested in-container).
    devices:
      - /dev/dri
    group_add:
      - "${RENDER_GROUP_ID:-992}"
    volumes:
      - ./models:/models:ro
    command: >
      --models /models --host 0.0.0.0 --port 8000 --ocr-engine vlm
      --vlm-model /models/${VLM_MODEL:-qwen2.5-vl-7b}
      --llm /models/${LLM_MODEL:-qwen3-8b-ov}
      --clip-model /models/clip
      --ocr-device ${OCR_DEVICE:-GPU}
      --llm-device ${LLM_DEVICE:-GPU}
      --clip-device ${CLIP_DEVICE:-GPU}
    mem_limit: 12g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: docker.io/postgres@sha256:df7bca0066e6f60cc3dd32faa70caddec20e2c22b58932f79498e5704b23854a
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # apply the pipeline schema on first init
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant ────────────────────────────────────────────────────────────────────
  qdrant:
    image: docker.io/qdrant/qdrant@sha256:45f8e3ddc2570a4d029877e1b5ec1045c19b3852b4e22a55c7f43b05aea0ca89
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── n8n ───────────────────────────────────────────────────────────────────────
  n8n:
    image: docker.io/n8nio/n8n@sha256:9f1f8e4c093c9924338bd168e3f813f746041d13b337753af0dbdd329e7b50f7
    container_name: n8n-openvino
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_CUSTOM_EXTENSIONS=/custom-node
      # Code node uses fs (move files) + crypto (sha256 dedup); file nodes limited to the data dir
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,crypto
      - N8N_RESTRICT_FILE_ACCESS_TO=/data
    volumes:
      - n8n_data:/home/node/.n8n
      # Only what n8n needs to load the custom node (built dist + its deps) — not the whole repo.
      - ../dist:/custom-node/dist:ro
      - ../package.json:/custom-node/package.json:ro
      - ../node_modules:/custom-node/node_modules:ro
      # Your document folder (host) -> /data (container). Create incoming/ processing/ processed/
      # failed/ rejected/ inside it. In the workflow's Config node set docRoot=/data.
      - ${DOC_ROOT:-./data}:/data
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  qdrant_data:
